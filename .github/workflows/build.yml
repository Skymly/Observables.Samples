name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Observables.Samples
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Wait for Observables packages on nuget.org
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          VERSION=$(grep -oP '(?<=<ObservablesPackageVersion>)[^<]+' Directory.Build.props)
          PACKAGE=observables.events.r3
          for i in $(seq 1 10); do
            if curl -fsS "https://api.nuget.org/v3-flatcontainer/${PACKAGE}/index.json" | grep -q "\"${VERSION}\""; then
              echo "Package Observables.Events.R3 ${VERSION} found on attempt ${i}"
              exit 0
            fi
            echo "Waiting for Observables.Events.R3 ${VERSION} (attempt ${i}/10)..."
            sleep 30
          done
          echo "Package Observables.Events.R3 ${VERSION} not found after retries"
          exit 1

      - name: Build and run CI samples via Nuke (skips Avalonia Routed)
        run: dotnet run --project build/_build.csproj -- --target Ci --configuration Release
        env:
          UseLocalObservables: "false"
