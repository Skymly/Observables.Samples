name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Observables.Samples
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build samples (NuGet 0.1.0-preview1)
        run: dotnet build Observables.Samples.slnx -c Release -p:UseLocalObservables=false

      - name: Run Events sample
        run: dotnet run --project Observables.Samples.Events -c Release --no-build

      - name: Run RestAPI sample
        run: dotnet run --project Observables.Samples.RestAPI -c Release --no-build
