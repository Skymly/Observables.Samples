name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Observables.Samples
        uses: actions/checkout@v4

      - name: Checkout Observables
        uses: actions/checkout@v4
        with:
          repository: Skymly/Observables
          path: Observables

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build samples
        run: dotnet build Observables.Samples.slnx -c Release

      - name: Run Events sample
        run: dotnet run --project Observables.Samples.Events -c Release --no-build

      - name: Run RestAPI sample
        run: dotnet run --project Observables.Samples.RestAPI -c Release --no-build
